<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mezcla de Concreto</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #edf2f7; text-align: left; }
        th { background: #f8f9fa; color: #718096; }
        .resultado { background-color: #e7f3ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Buscador de Resistencia</h2>
    <div class="search-box">
        <input type="number" id="inputResistencia" placeholder="Ingrese Resistencia (Kg/cm²)...">
        <button onclick="buscarOInterpolar()">Calcular</button>
    </div>

    <table id="tabla-datos">
        <thead>
            <tr>
                <th>Resistencia (Kg/cm²)</th>
                <th>Cemento (Saco)</th>
                <th>Arena (M³)</th>
                <th>Piedra (M³)</th>
                <th>Agua (Litro)</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <!-- Los datos se cargan aquí -->
        </tbody>
    </table>
</div>

<script>
    const datos = [
        { r: 119, c: 4.9, a: 0.5, p: 1, w: 155 },
        { r: 140, c: 5.4, a: 0.55, p: 0.92, w: 160 },
        { r: 159, c: 6.1, a: 0.63, p: 0.83, w: 185 },
        { r: 200, c: 7.1, a: 0.48, p: 0.95, w: 170 },
        { r: 240, c: 8.9, a: 0.6, p: 0.76, w: 190 },
        { r: 280, c: 9.9, a: 0.67, p: 0.67, w: 200 }
    ];

    function renderTabla(filaResaltada = null) {
        const tbody = document.getElementById('cuerpo-tabla');
        tbody.innerHTML = '';
        
        // Si hay una fila interpolada o buscada, la ponemos primero
        if (filaResaltada) {
            const tr = document.createElement('tr');
            tr.className = 'resultado';
            tr.innerHTML = `
                <td>${filaResaltada.r.toFixed(1)} (Resultado)</td>
                <td>${filaResaltada.c.toFixed(2)}</td>
                <td>${filaResaltada.a.toFixed(2)}</td>
                <td>${filaResaltada.p.toFixed(2)}</td>
                <td>${filaResaltada.w.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }

        // Mostramos el resto de la tabla base
        datos.forEach(f => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${f.r}</td><td>${f.c}</td><td>${f.a}</td><td>${f.p}</td><td>${f.w}</td>`;
            tbody.appendChild(tr);
        });
    }

    function buscarOInterpolar() {
        const valor = parseFloat(document.getElementById('inputResistencia').value);
        if (isNaN(valor)) return;

        // 1. Buscar coincidencia exacta
        const exacta = datos.find(d => d.r === valor);
        if (exacta) {
            renderTabla(exacta);
            return;
        }

        // 2. Interpolación
        let inferior = null;
        let superior = null;

        for (let i = 0; i < datos.length; i++) {
            if (datos[i].r < valor) inferior = datos[i];
            if (datos[i].r > valor) {
                superior = datos[i];
                break;
            }
        }

        if (inferior && superior) {
            const factor = (valor - inferior.r) / (superior.r - inferior.r);
            const interpolado = {
                r: valor,
                c: inferior.c + factor * (superior.c - inferior.c),
                a: inferior.a + factor * (superior.a - inferior.a),
                p: inferior.p + factor * (superior.p - inferior.p),
                w: inferior.w + factor * (superior.w - inferior.w)
            };
            renderTabla(interpolado);
        } else {
            alert("Valor fuera de rango (119 - 280)");
        }
    }

    // Carga inicial
    renderTabla();
</script>

</body>
</html>
