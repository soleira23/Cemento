<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Concreto Pro</title>
    <style>
        /* Variables de color */
        :root {
            --azul-brillante: #007bff;
            --verde-exito: #28a745;
            --fondo: #f4f7f9;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--fondo); 
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%; 
            max-width: 500px; /* Optimizado para ancho de móvil */
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            padding: 20px;
            box-sizing: border-box;
        }

        h2 { font-size: 1.4rem; color: #333; text-align: center; }

        .search-box { 
            display: flex; 
            flex-direction: column; /* Apilado en móvil */
            gap: 10px; 
            margin-bottom: 20px;
        }

        input { 
            padding: 15px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; /* Evita zoom automático en iPhone */
            outline: none;
        }

        input:focus { border-color: var(--azul-brillante); }

        button { 
            padding: 15px; 
            background: var(--azul-brillante); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
        }

        /* Contenedor para que la tabla sea deslizable */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        th { background: #f8f9fa; color: #666; }

        /* Estilo Azul Brillante para el resultado */
        .resultado-brillante { 
            background-color: var(--azul-brillante) !important; 
            color: white !important; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        
        .btn-usar-fila {
            padding: 5px 10px;
            font-size: 12px;
            background: #fff;
            color: var(--azul-brillante);
            border-radius: 4px;
        }

        /* Sección de Volumen */
        #seccion-volumen { 
            margin-top: 25px; 
            padding: 15px; 
            background: #ebfbee; 
            border-radius: 10px; 
            display: none;
            border: 2px solid var(--verde-exito);
        }

        .totales-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 5px solid var(--verde-exito);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Mezcla</h2>
    
    <div class="search-box">
        <input type="number" id="inputResistencia" placeholder="Resistencia (Kg/cm²)...">
        <button onclick="buscarOInterpolar()">CALCULAR</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Resist.</th>
                    <th>Cem.</th>
                    <th>Aren.</th>
                    <th>Pied.</th>
                    <th>Agua</th>
                    <th>-</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>

    <div id="seccion-volumen">
        <h3>Calcular m³ Totales</h3>
        <p>Mezcla: <strong id="mezcla-seleccionada"></strong></p>
        <div class="search-box">
            <input type="number" id="inputVolumen" placeholder="¿Cuántos m³ fabricar?">
            <button style="background: var(--verde-exito);" onclick="calcularTotales()">OBTENER MATERIALES</button>
        </div>
        <div id="resultado-final"></div>
    </div>
</div>

<script>
    const datos = [
        { r: 119, c: 4.9, a: 0.5, p: 1, w: 155 },
        { r: 140, c: 5.4, a: 0.55, p: 0.92, w: 160 },
        { r: 159, c: 6.1, a: 0.63, p: 0.83, w: 185 },
        { r: 200, c: 7.1, a: 0.48, p: 0.95, w: 170 },
        { r: 240, c: 8.9, a: 0.6, p: 0.76, w: 190 },
        { r: 280, c: 9.9, a: 0.67, p: 0.67, w: 200 }
    ];

    let seleccion = null;

    function renderTabla(brillante = null) {
        const tbody = document.getElementById('cuerpo-tabla');
        tbody.innerHTML = '';
        
        if (brillante) {
            const tr = document.createElement('tr');
            tr.className = 'resultado-brillante';
            tr.innerHTML = `
                <td>${brillante.r.toFixed(0)}</td>
                <td>${brillante.c.toFixed(1)}</td>
                <td>${brillante.a.toFixed(2)}</td>
                <td>${brillante.p.toFixed(2)}</td>
                <td>${brillante.w.toFixed(0)}</td>
                <td><button class="btn-usar-fila" onclick='activarVolumen(${JSON.stringify(brillante)})'>USAR</button></td>
            `;
            tbody.appendChild(tr);
        }

        datos.forEach(f => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${f.r}</td><td>${f.c}</td><td>${f.a}</td><td>${f.p}</td><td>${f.w}</td><td>-</td>`;
            tbody.appendChild(tr);
        });
    }

    function buscarOInterpolar() {
        const v = parseFloat(document.getElementById('inputResistencia').value);
        if (isNaN(v)) return;

        let exacta = datos.find(d => d.r === v);
        if (exacta) {
            renderTabla(exacta);
        } else {
            let inf = null, sup = null;
            for (let i = 0; i < datos.length; i++) {
                if (datos[i].r < v) inf = datos[i];
                if (datos[i].r > v) { sup = datos[i]; break; }
            }
            if (inf && sup) {
                const f = (v - inf.r) / (sup.r - inf.r);
                renderTabla({
                    r: v,
                    c: inf.c + f * (sup.c - inf.c),
                    a: inf.a + f * (sup.a - inf.a),
                    p: inf.p + f * (sup.p - inf.p),
                    w: inf.w + f * (sup.w - inf.w)
                });
            } else { alert("Rango válido: 119 a 280"); }
        }
    }

    function activarVolumen(m) {
        seleccion = m;
        document.getElementById('seccion-volumen').style.display = 'block';
        document.getElementById('mezcla-seleccionada').innerText = m.r.toFixed(0) + " Kg/cm²";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function calcularTotales() {
        const vol = parseFloat(document.getElementById('inputVolumen').value);
        if (isNaN(vol) || !seleccion) return;

        document.getElementById('resultado-final').innerHTML = `
            <div class="totales-card">
                <strong>Para ${vol} m³ totales:</strong><br><br>
                🏗️ <b>${(seleccion.c * vol).toFixed(1)}</b> Sacos Cemento<br>
                ⏳ <b>${(seleccion.a * vol).toFixed(2)}</b> m³ Arena<br>
                🪨 <b>${(seleccion.p * vol).toFixed(2)}</b> m³ Piedra<br>
                💧 <b>${(seleccion.w * vol).toFixed(0)}</b> Litros Agua
            </div>
        `;
    }

    renderTabla();
</script>

</body>
</html>
